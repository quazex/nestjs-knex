name: Release

on:
  release:
    types: [published]

env:
  HUSKY: 0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 2

    permissions:
      id-token: write  # Required for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Deps
        run: npm ci

      - name: Build module
        run: npm run build:compile

      - name: Release
        run: npm publish --provenance --access public
